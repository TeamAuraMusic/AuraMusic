name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name, for example 2.6.0'
        required: true
        type: string
      version_code:
        description: 'Build number / Android versionCode, for example 23'
        required: true
        type: string
      previous_tag:
        description: 'Previous release tag, for example v2.5.0. Leave blank to use the latest published GitHub Release.'
        required: false
        default: ''
        type: string
      draft:
        description: 'Create the GitHub release as a draft'
        required: true
        default: false
        type: boolean
      prerelease:
        description: 'Mark the GitHub release as a prerelease'
        required: true
        default: false
        type: boolean

env:
  JAVA_VERSION: '21'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Prepare release metadata
        id: metadata
        env:
          VERSION_NAME_INPUT: ${{ inputs.version_name || '' }}
          VERSION_CODE_INPUT: ${{ inputs.version_code || '' }}
        run: |
          set -euo pipefail

          if [ -n "${VERSION_NAME_INPUT}" ]; then
            version_name="${VERSION_NAME_INPUT#v}"
          else
            version_name="${GITHUB_REF_NAME#v}"
          fi

          if [ -n "${VERSION_CODE_INPUT}" ]; then
            version_code="${VERSION_CODE_INPUT}"
          else
            version_code="$(grep -E 'versionCode = [0-9]+' app/build.gradle.kts | head -n1 | grep -Eo '[0-9]+')"
          fi

          tag_name="v${version_name}"
          release_title="AuraMusic ${tag_name} (Build ${version_code})"

          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "release_title=${release_title}" >> "$GITHUB_OUTPUT"

      - name: Resolve previous published release
        id: previous_release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.metadata.outputs.tag_name }}
          PREVIOUS_TAG_INPUT: ${{ inputs.previous_tag || '' }}
        run: |
          set -euo pipefail

          if [ -n "${PREVIOUS_TAG_INPUT}" ]; then
            previous_tag="${PREVIOUS_TAG_INPUT}"
          else
            previous_tag="$(gh release list --limit 100 --json tagName,isDraft,publishedAt --jq '[.[] | select(.isDraft == false)] | sort_by(.publishedAt) | reverse | .[].tagName' | grep -Fxv "${TAG_NAME}" | head -n1 || true)"
          fi

          if [ -z "${previous_tag}" ]; then
            echo "Could not find a previous published GitHub Release. Provide previous_tag when running manually." >&2
            exit 1
          fi

          echo "previous_tag=${previous_tag}" >> "$GITHUB_OUTPUT"
          echo "Using ${previous_tag} as the previous release tag."

      - name: Update Android version
        env:
          VERSION_NAME: ${{ steps.metadata.outputs.version_name }}
          VERSION_CODE: ${{ steps.metadata.outputs.version_code }}
        run: |
          set -euo pipefail
          perl -0pi -e 's/versionCode = \d+/versionCode = $ENV{VERSION_CODE}/' app/build.gradle.kts
          perl -0pi -e 's/versionName = "[^"]+"/versionName = "$ENV{VERSION_NAME}"/' app/build.gradle.kts

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.metadata.outputs.tag_name }}
          PREVIOUS_TAG: ${{ steps.metadata.outputs.previous_tag }}
          VERSION_NAME: ${{ steps.metadata.outputs.version_name }}
          VERSION_CODE: ${{ steps.metadata.outputs.version_code }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          target_sha="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${target_sha}"

          python3 - <<'PY' > release-notes-body.md
          import os, subprocess, re
          from collections import defaultdict

          previous_tag = os.environ["PREVIOUS_TAG"]
          target_sha = os.environ["target_sha"]
          version_name = os.environ["VERSION_NAME"]
          version_code = os.environ["VERSION_CODE"]
          repo_owner = os.environ["REPO_OWNER"]
          compare_url = os.environ["compare_url"]

          raw = subprocess.check_output([
              "git", "log", "--reverse", "--pretty=format:%s||%h||%H||%an||%s",
              f"{previous_tag}..{target_sha}"
          ], text=True)

          lines = [l for l in raw.strip().split("\n") if l.strip()]
          commits = []
          for line in lines:
              parts = line.split("||")
              if len(parts) >= 5:
                  subject, short, full, author, _ = parts[0], parts[1], parts[2], parts[3], parts[4] if len(parts)>4 else ""
                  commits.append({"subject": subject.strip(), "short": short.strip(), "full": full.strip(), "author": author.strip()})
              elif len(parts) >= 4:
                  commits.append({"subject": parts[0].strip(), "short": parts[1].strip(), "full": parts[2].strip(), "author": parts[3].strip()})

          # Filter out bot commits and merge commits
          filtered = [c for c in commits if not c["subject"].startswith("Merge ") and "[bot]" not in c["author"]]

          # Categorize commits
          categories = defaultdict(list)
          translations = []
          other = []

          for c in filtered:
              s = c["subject"]
              if s.lower().startswith("translat") or "weblate" in s.lower():
                  translations.append(c)
              elif s.startswith("feat") or s.startswith("feature"):
                  categories["New Features"].append(c)
              elif s.startswith("fix"):
                  categories["Bug Fixes"].append(c)
              elif s.startswith("refactor"):
                  categories["Improvements"].append(c)
              elif s.startswith("build") or s.startswith("ci") or s.startswith("chore"):
                  categories["Build & Maintenance"].append(c)
              elif s.startswith("style") or s.startswith("ui") or s.startswith("UX"):
                  categories["UI/UX Improvements"].append(c)
              elif s.startswith("perf"):
                  categories["Performance"].append(c)
              elif s.startswith("docs") or s.startswith("doc"):
                  categories["Documentation"].append(c)
              elif s.startswith("test"):
                  categories["Testing"].append(c)
              elif s.startswith("tv") or s.startswith("(tv)"):
                  categories["Android TV"].append(c)
              elif s.startswith("lyrics"):
                  categories["Lyrics"].append(c)
              elif s.startswith("video") or "video" in s.lower():
                  categories["Video Playback"].append(c)
              elif s.startswith("search"):
                  categories["Search"].append(c)
              elif s.startswith("player") or s.startswith("playback"):
                  categories["Playback"].append(c)
              else:
                  other.append(c)

          # Build summary of key changes
          all_features = categories.get("New Features", [])
          all_fixes = categories.get("Bug Fixes", [])
          key_changes = []
          for c in all_features[:5]:
              key_changes.append(c["subject"])
          for c in all_fixes[:3]:
              key_changes.append(c["subject"])

          # Generate output
          lines = []
          lines.append(f"# AuraMusic v{version_name} (Build {version_code}) Release Notes")
          lines.append("")

          # Summary note
          if key_changes:
              summary_items = ", ".join(key_changes[:4])
              lines.append("> [!NOTE]")
              lines.append(f"> This release includes {summary_items}.")
              lines.append("")

          lines.append("## What's New")
          lines.append("")

          # Render each category
          ordered_cats = ["New Features", "Android TV", "Lyrics", "Video Playback", "Playback", "Search", "UI/UX Improvements", "Improvements", "Bug Fixes", "Performance", "Build & Maintenance", "Documentation", "Testing"]

          for cat in ordered_cats:
              items = categories.get(cat, [])
              if not items:
                  continue
              lines.append(f"### {cat}")
              lines.append(f"Implemented by @{repo_owner}")
              lines.append("")
              for c in items:
                  lines.append(f"- {c['subject']}")
              lines.append("")

          # Other changes
          if other:
              lines.append("### Other Changes")
              lines.append(f"Implemented by @{repo_owner}")
              lines.append("")
              for c in other:
                  lines.append(f"- {c['subject']}")
              lines.append("")

          # Translations
          if translations:
              lines.append("## Translation Contributors")
              lines.append("")
              # Extract unique translator names
              translators = set()
              for t in translations:
                  name = t["author"]
                  if "[bot]" not in name and name.lower() not in ("chila254", repo_owner.lower()):
                      translators.add(name)
                  # Try to extract @username from commit message
                  m = re.search(r'@(\w+)', t["subject"])
                  if m:
                      translators.add(m.group(1))
              for name in sorted(translators):
                  lines.append(f"- @{name} contributed translations")
              lines.append("")

          lines.append(f"**Full Changelog**: {compare_url}")
          lines.append("")

          print("\n".join(lines))

      - name: Update RELEASE_NOTES.md and CHANGELOG.md
        env:
          VERSION_NAME: ${{ steps.metadata.outputs.version_name }}
          VERSION_CODE: ${{ steps.metadata.outputs.version_code }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          from pathlib import Path

          version_name = os.environ["VERSION_NAME"]
          version_code = os.environ["VERSION_CODE"]
          body = Path("release-notes-body.md").read_text(encoding="utf-8").strip()

          targets = {
              "RELEASE_NOTES.md": "Release Notes",
              "CHANGELOG.md": "Changelog",
          }

          for filename, suffix in targets.items():
              path = Path(filename)
              old = path.read_text(encoding="utf-8") if path.exists() else ""
              new_section = f"# AuraMusic v{version_name} (Build {version_code}) {suffix}\n\n{body}\n\n"
              path.write_text(new_section + old.lstrip(), encoding="utf-8")
          PY

      - name: Decode keystores
        env:
          DEBUG_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE }}
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          set -euo pipefail
          mkdir -p app/keystore
          echo "$DEBUG_KEYSTORE" | base64 -d > app/keystore/debug.keystore
          echo "$RELEASE_KEYSTORE" | base64 -d > app/keystore/release.keystore
          ls -la app/keystore/

      - name: Create local.properties
        run: |
          set -euo pipefail
          cat > local.properties << EOF
          sdk.dir=$ANDROID_HOME

          # LastFM API Keys
          LASTFM_API_KEY=${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET=${{ secrets.LASTFM_SECRET }}

          # Debug keystore
          debug.storeFile=keystore/debug.keystore
          debug.storePassword=${{ secrets.DEBUG_STORE_PASSWORD }}
          debug.keyAlias=${{ secrets.DEBUG_KEY_ALIAS }}
          debug.keyPassword=${{ secrets.DEBUG_KEY_PASSWORD }}

          # Release keystore
          release.storeFile=keystore/release.keystore
          release.storePassword=${{ secrets.RELEASE_STORE_PASSWORD }}
          release.keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}
          release.keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}

          # Persistent Debug keystore
          debug.persistent.storeFile=keystore/debug.keystore
          debug.persistent.storePassword=${{ secrets.DEBUG_STORE_PASSWORD }}
          debug.persistent.keyAlias=${{ secrets.DEBUG_KEY_ALIAS }}
          debug.persistent.keyPassword=${{ secrets.DEBUG_KEY_PASSWORD }}
          EOF

      - name: Build release APK variants
        run: |
          set -euo pipefail
          sed -i 's|tinypinyin = "2.0.3"|tinypinyin = "2.0.1"|g' gradle/libs.versions.toml

          ./gradlew assembleFossMobileUniversalRelease --no-daemon --no-configuration-cache
          ./gradlew assembleGmsMobileUniversalRelease --no-daemon --no-configuration-cache
          ./gradlew assembleFossTvUniversalRelease --no-daemon --no-configuration-cache

      - name: Collect and rename APK assets
        env:
          VERSION_NAME: ${{ steps.metadata.outputs.version_name }}
          VERSION_CODE: ${{ steps.metadata.outputs.version_code }}
        run: |
          set -euo pipefail
          mkdir -p release-artifacts

          while IFS= read -r apk; do
            flavor_dir="$(basename "$(dirname "$(dirname "$apk")")")"
            variant_name="$(echo "$flavor_dir" | sed -E 's/([a-z0-9])([A-Z])/\1-\2/g' | tr '[:upper:]' '[:lower:]')"

            case "$variant_name" in
              *foss*mobile*)   out_name="AuraMusic.apk" ;;
              *gms*mobile*)    out_name="AuraMusic-with-Google-Cast.apk" ;;
              *foss*tv*)       out_name="AuraMusic-Tv.apk" ;;
              *)               out_name="AuraMusic-v${VERSION_NAME}-build${VERSION_CODE}-${variant_name}.apk" ;;
            esac

            cp "$apk" "release-artifacts/${out_name}"
          done < <(find app/build/outputs/apk -path '*/release/*.apk' -type f | sort)

          ls -la release-artifacts

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AuraMusic-${{ steps.metadata.outputs.tag_name }}-APKs
          path: release-artifacts/*.apk
          if-no-files-found: error

      - name: Commit release files
        env:
          TAG_NAME: ${{ steps.metadata.outputs.tag_name }}
          VERSION_CODE: ${{ steps.metadata.outputs.version_code }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git config user.name "${{ github.repository_owner }}"
          git config user.email "${{ github.repository_owner }}@users.noreply.github.com"

          git add app/build.gradle.kts RELEASE_NOTES.md CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): ${TAG_NAME} (build ${VERSION_CODE})"
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              git push origin "HEAD:${DEFAULT_BRANCH}"
            else
              git push origin "HEAD:${GITHUB_REF_NAME}"
            fi
          fi

      - name: Create tag
        env:
          TAG_NAME: ${{ steps.metadata.outputs.tag_name }}
          RELEASE_TITLE: ${{ steps.metadata.outputs.release_title }}
        run: |
          set -euo pipefail
          git fetch --tags
          if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists; using existing tag."
          else
            git tag -a "${TAG_NAME}" -m "${RELEASE_TITLE}"
            git push origin "${TAG_NAME}"
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.metadata.outputs.tag_name }}
          RELEASE_TITLE: ${{ steps.metadata.outputs.release_title }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "${RELEASE_TITLE}" \
              --notes-file release-notes-body.md \
              $([ "${DRAFT}" = "true" ] && echo --draft || true) \
              $([ "${PRERELEASE}" = "true" ] && echo --prerelease || true)
            gh release upload "${TAG_NAME}" release-artifacts/*.apk --clobber
          else
            args=("${TAG_NAME}" release-artifacts/*.apk --title "${RELEASE_TITLE}" --notes-file release-notes-body.md)
            if [ "${DRAFT}" = "true" ]; then
              args+=(--draft)
            fi
            if [ "${PRERELEASE}" = "true" ]; then
              args+=(--prerelease)
            fi
            gh release create "${args[@]}"
          fi
