syntax = "proto3";

package com.auramusic.app.listentogether.proto;

option java_package = "com.auramusic.app.listentogether.proto";
option java_multiple_files = false;

// This creates an outer class "Listenogether" containing all messages

// ============================================================================
// Shared data structures
// ============================================================================

// Track information
message TrackInfo {
    string id = 1;
    string title = 2;
    string artist = 3;
    string album = 4;
    int64 duration = 5;
    string thumbnail = 6;
    string suggested_by = 7;
}

// User information
message UserInfo {
    string user_id = 1;
    string username = 2;
    bool is_host = 3;
    bool is_connected = 4;
}

// Room state
message RoomState {
    string room_code = 1;
    string host_id = 2;
    repeated UserInfo users = 3;
    TrackInfo current_track = 4;
    bool is_playing = 5;
    int64 position = 6;
    int64 last_update = 7;
    float volume = 8;
    repeated TrackInfo queue = 9;
}

// Envelope for all messages
message Envelope {
    string type = 1;
    bytes payload = 2;
    bool compressed = 3;
}

// ============================================================================
// Request payloads (Client -> Server)
// ============================================================================

// Create a new room
message CreateRoomPayload {
    string username = 1;
}

// Join an existing room
message JoinRoomPayload {
    string room_code = 1;
    string username = 2;
}

// Approve a user to join
message ApproveJoinPayload {
    string user_id = 1;
}

// Reject a user from joining
message RejectJoinPayload {
    string user_id = 1;
    string reason = 2;
}

// Playback action (play, pause, seek, skip, queue, etc.)
message PlaybackActionPayload {
    string action = 1;
    string track_id = 2;
    int64 position = 3;
    bool insert_next = 4;
    float volume = 5;
    int64 server_time = 6;
    TrackInfo track_info = 7;
    repeated TrackInfo queue = 8;
    string queue_title = 9;
}

// Buffer ready notification
message BufferReadyPayload {
    string track_id = 1;
}

// Kick a user from the room
message KickUserPayload {
    string user_id = 1;
    string reason = 2;
}

// Transfer host to another user
message TransferHostPayload {
    string new_host_id = 1;
}

// Suggest a track to the host
message SuggestTrackPayload {
    TrackInfo track_info = 1;
}

// Approve a track suggestion
message ApproveSuggestionPayload {
    string suggestion_id = 1;
}

// Reject a track suggestion
message RejectSuggestionPayload {
    string suggestion_id = 1;
    string reason = 2;
}

// Reconnect to room
message ReconnectPayload {
    string session_token = 1;
}

// ============================================================================
// Response payloads (Server -> Client)
// ============================================================================

// Room created successfully
message RoomCreatedPayload {
    string room_code = 1;
    string user_id = 2;
    string session_token = 3;
}

// Incoming join request
message JoinRequestPayload {
    string user_id = 1;
    string username = 2;
}

// Join approved
message JoinApprovedPayload {
    string room_code = 1;
    string user_id = 2;
    string session_token = 3;
    RoomState state = 4;
}

// Join rejected
message JoinRejectedPayload {
    string reason = 1;
}

// User joined the room
message UserJoinedPayload {
    string user_id = 1;
    string username = 2;
}

// User left the room
message UserLeftPayload {
    string user_id = 1;
    string username = 2;
}

// Buffer wait notification
message BufferWaitPayload {
    string track_id = 1;
    repeated string waiting_for = 2;
}

// Buffer complete notification
message BufferCompletePayload {
    string track_id = 1;
}

// Error from server
message ErrorPayload {
    string code = 1;
    string message = 2;
}

// Host changed notification
message HostChangedPayload {
    string new_host_id = 1;
    string new_host_name = 2;
}

// User was kicked
message KickedPayload {
    string reason = 1;
}

// Sync state payload
message SyncStatePayload {
    TrackInfo current_track = 1;
    bool is_playing = 2;
    int64 position = 3;
    int64 last_update = 4;
    repeated TrackInfo queue = 5;
    float volume = 6;
}

// Reconnected payload
message ReconnectedPayload {
    string room_code = 1;
    string user_id = 2;
    RoomState state = 3;
    bool is_host = 4;
}

// User reconnected
message UserReconnectedPayload {
    string user_id = 1;
    string username = 2;
}

// User disconnected
message UserDisconnectedPayload {
    string user_id = 1;
    string username = 2;
}

// Suggestion received
message SuggestionReceivedPayload {
    string suggestion_id = 1;
    string from_user_id = 2;
    string from_username = 3;
    TrackInfo track_info = 4;
}

// Suggestion approved
message SuggestionApprovedPayload {
    string suggestion_id = 1;
    TrackInfo track_info = 2;
}

// Suggestion rejected
message SuggestionRejectedPayload {
    string suggestion_id = 1;
    string reason = 2;
}
